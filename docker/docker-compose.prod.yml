services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: csms-web-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: node server.js
    networks:
      - csms-network

  ocpp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: csms-ocpp-prod
    restart: always
    ports:
      - "8089:8089"
    expose:
      - "8089"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run start:ocpp:prod
    networks:
      - csms-network

networks:
  csms-network:
    external: true
